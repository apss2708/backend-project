version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pipeline_db
    restart: always
    environment:
      POSTGRES_DB: transactions_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactions_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pipeline_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migration:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: pipeline_migration
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/transactions_db
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: pipeline_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/transactions_db
      - REDIS_URL=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - UPLOAD_DIR=/workspace/uploads
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    volumes:
      - uploads_data:/workspace/uploads

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: pipeline_worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/transactions_db
      - REDIS_URL=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - UPLOAD_DIR=/workspace/uploads
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    volumes:
      - uploads_data:/workspace/uploads

volumes:
  postgres_data:
  uploads_data:
